<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ვებ დიზაინი — შუალედური ტესტი</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #15151f;
    --card: #1c1c2a;
    --border: #2a2a3d;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --accent3: #43e97b;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --correct: #43e97b;
    --wrong: #ff6584;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Georgian', sans-serif;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    border-bottom: 2px solid var(--accent);
    padding: 32px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-sub {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
  }

  /* Progress bar */
  .progress-wrap {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .score-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent3);
    white-space: nowrap;
  }

  /* Main */
  .main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* Section labels */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 40px 0 20px;
  }
  .section-header:first-child { margin-top: 0; }
  .section-tag {
    background: var(--accent);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 99px;
    text-transform: uppercase;
  }
  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .q-card:hover { border-color: rgba(108,99,255,0.4); }
  .q-card.answered-correct { border-color: var(--correct); background: rgba(67,233,123,0.04); }
  .q-card.answered-wrong { border-color: var(--wrong); background: rgba(255,101,132,0.04); }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(108,99,255,0.12);
    border-radius: 6px;
    padding: 2px 8px;
  }
  .q-status {
    font-size: 16px;
    display: none;
  }

  .q-text {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 16px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .option-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    padding: 12px 16px;
    text-align: left;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
    transform: translateX(4px);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.selected { border-color: var(--accent); background: rgba(108,99,255,0.14); }
  .option-btn.correct { border-color: var(--correct) !important; background: rgba(67,233,123,0.12) !important; color: var(--correct); }
  .option-btn.wrong { border-color: var(--wrong) !important; background: rgba(255,101,132,0.1) !important; color: var(--wrong); }
  .option-btn.reveal-correct { border-color: var(--correct) !important; background: rgba(67,233,123,0.06) !important; color: var(--correct); }

  .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    background: var(--bg);
    border-radius: 4px;
    padding: 1px 7px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-btn.correct .opt-letter,
  .option-btn.reveal-correct .opt-letter { color: var(--correct); background: rgba(67,233,123,0.1); }
  .option-btn.wrong .opt-letter { color: var(--wrong); background: rgba(255,101,132,0.1); }

  /* Result bar */
  .result-bar {
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 28px 32px;
    text-align: center;
    margin-top: 48px;
    display: none;
  }
  .result-bar.show { display: block; }
  .result-big {
    font-size: 56px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .result-sub { color: var(--muted); font-size: 15px; margin-top: 8px; }
  .result-grade { font-size: 20px; font-weight: 600; margin-top: 16px; }
  .retry-btn {
    margin-top: 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .retry-btn:hover { opacity: 0.85; }

  /* Submit button */
  .submit-wrap {
    text-align: center;
    margin-top: 40px;
  }
  .submit-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 16px 48px;
    font-family: 'Noto Sans Georgian', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 4px 24px rgba(108,99,255,0.35);
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-2px); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Floating answered counter */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 24px;
    background: var(--accent);
    color: #fff;
    border-radius: 99px;
    padding: 10px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(108,99,255,0.5);
    pointer-events: none;
    z-index: 200;
    transition: background 0.3s;
  }
</style>
</head>

  });

  html += `<div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="submitTest()">ტესტის დასრულება და შეფასება</button>
  </div>`;

  html += `<div class="result-bar" id="resultBar">
    <div class="result-big" id="resultBig">-</div>
    <div class="result-sub" id="resultSub">სწორი პასუხი 104-დან</div>
    <div class="result-grade" id="resultGrade"></div>
    <button class="retry-btn" onclick="retryTest()">ხელახლა გავლა</button>
  </div>`;

  main.innerHTML = html;
}

function pick(qid, optIdx) {
  if (submitted) return;
  const q = questions.find(x => x.id === qid);
  const wasAnswered = answered[qid] !== undefined;

  // Remove old selection
  q.opts.forEach((_, i) => {
    const b = document.getElementById(`opt-${qid}-${i}`);
    b.classList.remove('selected');
  });

  if (wasAnswered) {
    score -= (answered[qid] === q.ans ? 1 : 0);
  }

  answered[qid] = optIdx;
  document.getElementById(`opt-${qid}-${optIdx}`).classList.add('selected');
  score += (optIdx === q.ans ? 1 : 0);

  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answered).length;
  const pct = (count / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${count} / ${questions.length}`;
  document.getElementById('scorePill').textContent = `ქულა: ${score}`;
  document.getElementById('fab').textContent = `${count} / ${questions.length} ✓`;
}

function submitTest() {
  if (submitted) return;
  submitted = true;
  document.getElementById('submitBtn').disabled = true;

  // Reveal answers
  questions.forEach(q => {
    const card = document.getElementById(`qcard-${q.id}`);
    const userAns = answered[q.id];
    const status = document.getElementById(`status-${q.id}`);
    status.style.display = 'inline';

    q.opts.forEach((_, i) => {
      const b = document.getElementById(`opt-${q.id}-${i}`);
      b.disabled = true;
      b.classList.remove('selected');
    });

    if (userAns === undefined) {
      // Not answered — just show correct
      document.getElementById(`opt-${q.id}-${q.ans}`).classList.add('reveal-correct');
      card.style.borderColor = '#444';
      status.textContent = '—';
    } else if (userAns === q.ans) {
      document.getElementById(`opt-${q.id}-${userAns}`).classList.add('correct');
      card.classList.add('answered-correct');
      status.textContent = '✓';
    } else {
      document.getElementById(`opt-${q.id}-${userAns}`).classList.add('wrong');
      document.getElementById(`opt-${q.id}-${q.ans}`).classList.add('reveal-correct');
      card.classList.add('answered-wrong');
      status.textContent = '✗';
    }
  });

  // Recount true score
  let trueScore = 0;
  questions.forEach(q => { if (answered[q.id] === q.ans) trueScore++; });
  score = trueScore;
  updateProgress();

  // Show result
  const pct = Math.round((trueScore / questions.length) * 100);
  const rb = document.getElementById('resultBar');
  rb.classList.add('show');
  document.getElementById('resultBig').textContent = `${trueScore} / ${questions.length}`;
  document.getElementById('resultSub').textContent = `სწორი პასუხი — ${pct}%`;
  let grade = '';
  if (pct >= 91) grade = '🏆 შეფასება: A — ბრწყინვალე!';
  else if (pct >= 81) grade = '🥇 შეფასება: B — ძალიან კარგი';
  else if (pct >= 71) grade = '🥈 შეფასება: C — კარგი';
  else if (pct >= 61) grade = '🥉 შეფასება: D — დამაკმაყოფილებელი';
  else grade = '📚 შეფასება: F — საჭიროა გამეორება';
  document.getElementById('resultGrade').textContent = grade;
  rb.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function retryTest() {
  Object.keys(answered).forEach(k => delete answered[k]);
  score = 0;
  submitted = false;
  buildUI();
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

buildUI();
updateProgress();
</script>
</body>
</html>
